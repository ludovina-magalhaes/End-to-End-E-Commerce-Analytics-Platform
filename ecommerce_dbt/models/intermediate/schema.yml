version: 2

models:
  - name: int_order_details
    description: "Une pedidos con productos e incluye ingresos, costo y beneficio por ítem."
    columns:
      - name: order_id
        description: "Identificador del pedido."
        tests:
          - not_null

      - name: customer_id
        description: "Identificador del cliente."
        tests:
          - not_null

      - name: order_date
        description: "Fecha del pedido."
        tests:
          - not_null

      - name: product_id
        description: "Identificador del producto."
        tests:
          - not_null

      - name: quantity
        description: "Cantidad comprada."
        tests:
          - not_null

      - name: price
        description: "Precio unitario del producto."
        tests:
          - not_null

      - name: custo
        description: "Costo unitario del producto."
        tests:
          - not_null

      - name: valor_da_linha
        description: "Ingresos del ítem."
        tests:
          - not_null

      - name: custo_total
        description: "Costo total del ítem."
        tests:
          - not_null

      - name: lucro
        description: "Beneficio del ítem."
        tests:
          - not_null

  - name: int_cancel_orders
    description: "Tabla intermedia con pedidos cancelados y su respectivo motivo."
    columns:
      - name: order_id
        description: "Identificador del pedido cancelado."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Identificador del cliente."
        tests:
          - not_null

      - name: cancel_date
        description: "Fecha de la cancelación."
        tests:
          - not_null

      - name: cancel_reason
        description: "Motivo de la cancelación."